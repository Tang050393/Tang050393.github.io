    max-width: 560px;
    width: 100%;
  }
  h1 { font-size: 26px; color: #333; margin-bottom: 6px; text-align: center; }
  .date { text-align: center; color: #999; font-size: 13px; margin-bottom: 20px; }

    color: #444;

  .back { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; font-weight: bold; font-size: 14px; }

<body>
<div class="container">
  <h1>💻 電腦課心得</h1>
  <p class="date">2026 年 6 月</p>

  <p>
    這學期的電腦課對我來說並不容易。一開始接觸程式概念時，很多邏輯和語法都讓我感到陌生，常常看著螢幕上的錯誤訊息不知道該怎麼解決。每次作業卡關時，總要花很多時間反覆嘗試、查找資料，甚至從頭來過。
  </p>

  <p>
    不過，正是因為這些挫折，讓我學會了面對問題的方法。我慢慢發現，寫程式就像在解謎——把大問題拆成小問題，一步一步找出錯誤在哪裡。當我終於讓程式成功跑起來的那一刻，那種成就感是無法形容的。
  </p>

  <p>
    這門課讓我收穫最多的不是技術本身，而是解決問題的耐心和邏輯思考能力。雖然過程很辛苦，但回頭看，每一步都很值得。
  </p>
