<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打地鼠</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
  }
  .container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 25px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 26px; color: #333; margin-bottom: 5px; }
  .subtitle { color: #666; margin-bottom: 15px; font-size: 14px; }
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    background: #f0f0f5;
    padding: 10px 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    font-weight: bold;
    color: #555;
  }
  .stats span { font-size: 18px; color: #764ba2; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 15px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .hole {
    aspect-ratio: 1;
    background: #8B4513;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    cursor: pointer;
    transition: background 0.15s;
    box-shadow: inset 0 -8px 0 #5a2d0c;
    overflow: hidden;
  }
  .hole .mole {
    transform: translateY(100%);
    transition: transform 0.2s;
  }
  .hole.up .mole { transform: translateY(0); }
  .hole.whacked { background: #a0522d; }
  .btn {
    background: linear-gradient(145deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }
  .btn:active { transform: translateY(0); }
  .back { display: inline-block; margin-top: 12px; color: #667eea; text-decoration: none; font-size: 14px; }
  .back:hover { text-decoration: underline; }
  .message { margin-top: 12px; font-size: 20px; font-weight: bold; color: #4caf50; min-height: 30px; }
  @media (max-width: 480px) {
    .hole { font-size: 36px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔨 打地鼠</h1>
  <p class="subtitle">地鼠冒出來就快點打牠！</p>
  <div class="stats">
    <div>得分：<span id="score">0</span></div>
    <div>時間：<span id="timer">30</span> 秒</div>
  </div>
  <div class="grid" id="grid"></div>
  <button class="btn" onclick="initGame()">🔄 重新開始</button>
  <div class="message" id="message"></div>
  <a class="back" href="index.html">← 回遊戲大廳</a>
</div>
<script>
  let score = 0, timeLeft = 30, active = false, timer = null, spawner = null;

  function initGame() {
    score = 0; timeLeft = 30; active = true;
    document.getElementById('score').textContent = 0;
    document.getElementById('timer').textContent = 30;
    document.getElementById('message').textContent = '';
    if (timer) clearInterval(timer);
    if (spawner) clearInterval(spawner);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const hole = document.createElement('div');
      hole.className = 'hole';
      hole.innerHTML = '<span class="mole">🐹</span>';
      hole.addEventListener('click', () => whack(i));
      grid.appendChild(hole);
    }
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timer); clearInterval(spawner);
        active = false;
        document.querySelectorAll('.hole').forEach(h => h.classList.remove('up'));
        document.getElementById('message').textContent = '⏰ 時間到！你得了 ' + score + ' 分！';
      }
    }, 1000);
    spawner = setInterval(() => {
      if (!active) return;
      document.querySelectorAll('.hole').forEach(h => h.classList.remove('up'));
      const idx = Math.floor(Math.random() * 9);
      document.querySelectorAll('.hole')[idx].classList.add('up');
    }, 800);
  }

  function whack(index) {
    if (!active) return;
    const hole = document.querySelectorAll('.hole')[index];
    if (hole.classList.contains('up')) {
      hole.classList.remove('up');
      hole.classList.add('whacked');
      setTimeout(() => hole.classList.remove('whacked'), 200);
      score++;
      document.getElementById('score').textContent = score;
    }
  }
  initGame();
</script>
</body>
</html>
