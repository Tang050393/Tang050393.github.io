<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒童遊戲樂園</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
  }
  .container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 35px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
  p { color: #666; margin-bottom: 20px; font-size: 15px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .links a {
    display: block;
    padding: 14px;
    background: #f5f5fa;
    border-radius: 12px;
    text-decoration: none;
    color: #333;
    font-weight: bold;
    font-size: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .links a:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.2); }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 兒童遊戲樂園</h1>
  <p>三個好玩的小遊戲，點擊進入：</p>
  <div class="links">
    <a href="game.html">🎮 遊戲大廳</a>
    <a href="遊戲說明.html">📖 遊戲說明</a>
  </div>
</div>
